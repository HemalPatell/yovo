{% extends "admin/base.html" %}
{% block title %}{{ title }} | YOVO Admin{% endblock %}
{% block extrastyle %}{{ block.super }}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--ac:#e8853a;--ac2:#f5a623;--bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;--bg4:#22222e;--border:#2a2a38;--text:#f0ece8;--text2:#9090a8;--text3:#606078;--success:#3acf80;--danger:#e85050;--info:#5080e8}
*{box-sizing:border-box}
body,#container{background:var(--bg)!important;color:var(--text)!important;font-family:'Inter',system-ui,sans-serif!important}
/* HEADER */
#header{background:linear-gradient(135deg,#0d0d16 0%,#1a1020 50%,#0d0d16 100%)!important;border-bottom:1px solid var(--ac)!important;padding:0 28px!important;height:60px!important;display:flex!important;align-items:center!important;justify-content:space-between!important;position:sticky!important;top:0!important;z-index:100!important;box-shadow:0 2px 20px rgba(232,133,58,0.15)!important}
#branding h1{font-size:1.2rem!important;font-weight:800!important;letter-spacing:-0.3px!important;margin:0!important}
#branding h1 a,#branding h1 a:visited{color:var(--text)!important;text-decoration:none!important;display:flex!important;align-items:center!important;gap:10px!important}
#branding h1 a::before{content:"🛍";font-size:1.3rem}
#branding h1 a span{background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#user-tools{color:var(--text2)!important;font-size:0.78rem!important}
#user-tools a{color:var(--ac)!important;font-weight:600!important;text-decoration:none!important;padding:6px 12px!important;border:1px solid rgba(232,133,58,0.3)!important;border-radius:6px!important;transition:all 0.2s!important}
#user-tools a:hover{background:rgba(232,133,58,0.1)!important;border-color:var(--ac)!important}
/* BREADCRUMBS */
div.breadcrumbs{background:var(--bg2)!important;border-bottom:1px solid var(--border)!important;color:var(--text2)!important;padding:10px 28px!important;font-size:0.78rem!important}
div.breadcrumbs a{color:var(--ac)!important;text-decoration:none!important}
/* CONTENT */
#content-main,#content{background:transparent!important;padding:24px 28px!important}
/* SIDEBAR */
#nav-sidebar{background:var(--bg2)!important;border-right:1px solid var(--border)!important;min-width:220px!important}
.toggle-nav-sidebar-icon{color:var(--text2)!important}
/* sidebar links */
#nav-sidebar a,.sidebar-nav-links a{color:var(--text2)!important;font-size:0.82rem!important;padding:7px 12px!important;display:block!important;border-radius:8px!important;margin:2px 8px!important;text-decoration:none!important;transition:all 0.18s!important;font-weight:500!important}
#nav-sidebar a:hover,.sidebar-nav-links a:hover{background:rgba(232,133,58,0.1)!important;color:var(--ac)!important;padding-left:16px!important}
.sidebar-nav-links li.selected a{background:rgba(232,133,58,0.15)!important;color:var(--ac)!important;font-weight:700!important;border-left:3px solid var(--ac)!important}
#nav-sidebar .current-app .section:first-child h2,.sidebar-nav-links .section h2{color:var(--text3)!important;font-size:0.65rem!important;text-transform:uppercase!important;letter-spacing:1.2px!important;padding:14px 14px 4px!important;font-weight:700!important}
/* MODULES */
.module,div.module{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:12px!important;margin-bottom:18px!important;overflow:hidden!important;box-shadow:0 2px 12px rgba(0,0,0,0.3)!important}
.module caption,.module h2,div.module h2,div.module caption{background:linear-gradient(90deg,var(--bg4),var(--bg3))!important;color:var(--ac)!important;font-size:0.7rem!important;font-weight:800!important;letter-spacing:1.2px!important;text-transform:uppercase!important;padding:12px 18px!important;border-bottom:1px solid var(--border)!important;margin:0!important}
/* TABLES */
#result_list,.results table{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:12px!important;overflow:hidden!important;width:100%!important;border-collapse:collapse!important;box-shadow:0 2px 12px rgba(0,0,0,0.3)!important}
thead th{background:var(--bg4)!important;color:var(--text2)!important;font-size:0.68rem!important;font-weight:700!important;text-transform:uppercase!important;letter-spacing:0.8px!important;padding:13px 16px!important;border-bottom:1px solid var(--border)!important;white-space:nowrap!important}
thead th a,thead th a:visited{color:var(--text2)!important;text-decoration:none!important}
thead th a:hover{color:var(--ac)!important}
tbody tr{border-bottom:1px solid var(--border)!important;transition:background 0.15s!important}
tbody tr:last-child{border-bottom:none!important}
tbody tr:hover{background:rgba(232,133,58,0.04)!important}
tr.selected td{background:rgba(232,133,58,0.08)!important}
td,th.sorted{padding:12px 16px!important;color:var(--text)!important;font-size:0.84rem!important;vertical-align:middle!important}
td a,td a:visited{color:var(--ac)!important;text-decoration:none!important;font-weight:500!important}
td a:hover{text-decoration:underline!important}
/* FILTERS */
#changelist-filter{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:12px!important;overflow:hidden!important;box-shadow:0 2px 12px rgba(0,0,0,0.3)!important}
#changelist-filter h2{background:var(--bg4)!important;color:var(--ac)!important;font-size:0.68rem!important;text-transform:uppercase!important;letter-spacing:1px!important;padding:12px 16px!important;margin:0!important;border-bottom:1px solid var(--border)!important;font-weight:800!important}
#changelist-filter h3{color:var(--text2)!important;font-size:0.72rem!important;font-weight:700!important;padding:12px 14px 4px!important;margin:0!important;text-transform:uppercase!important;letter-spacing:0.8px!important}
#changelist-filter ul{padding:4px 10px 12px!important;margin:0!important;list-style:none!important}
#changelist-filter ul li a{color:var(--text2)!important;font-size:0.82rem!important;padding:5px 8px!important;display:block!important;border-radius:7px!important;text-decoration:none!important;transition:all 0.15s!important}
#changelist-filter ul li a:hover{background:rgba(232,133,58,0.1)!important;color:var(--ac)!important}
#changelist-filter ul li.selected a{color:var(--ac)!important;font-weight:700!important;background:rgba(232,133,58,0.08)!important}
/* SEARCH */
#changelist-search{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:10px!important;padding:12px 14px!important;margin-bottom:14px!important;display:flex!important;gap:8px!important;align-items:center!important}
#searchbar,input#searchbar{background:var(--bg)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:8px!important;padding:8px 14px!important;font-size:0.875rem!important;flex:1!important;font-family:'Inter',sans-serif!important}
#searchbar:focus{border-color:var(--ac)!important;outline:none!important;box-shadow:0 0 0 3px rgba(232,133,58,0.15)!important}
/* ACTIONS BAR */
.actions{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:10px!important;padding:10px 14px!important;margin-bottom:14px!important;display:flex!important;align-items:center!important;gap:10px!important}
.actions select{background:var(--bg)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:7px!important;padding:7px 10px!important;font-family:'Inter',sans-serif!important;font-size:0.82rem!important}
.actions label{color:var(--text2)!important;font-size:0.82rem!important}
/* BUTTONS */
.button,input[type=submit],input[type=button],.submit-row input[type=submit]{background:linear-gradient(135deg,var(--ac),var(--ac2))!important;color:#fff!important;border:none!important;border-radius:8px!important;padding:9px 20px!important;font-weight:700!important;font-size:0.82rem!important;cursor:pointer!important;font-family:'Inter',sans-serif!important;transition:all 0.2s!important;box-shadow:0 2px 8px rgba(232,133,58,0.3)!important}
.button:hover,input[type=submit]:hover{transform:translateY(-1px)!important;box-shadow:0 4px 16px rgba(232,133,58,0.4)!important}
.button.default{background:linear-gradient(135deg,var(--ac),var(--ac2))!important}
a.deletelink,input[name=_delete]{background:var(--danger)!important;color:#fff!important;border-radius:7px!important;padding:7px 14px!important;text-decoration:none!important;font-size:0.8rem!important;font-weight:600!important;border:none!important}
.addlink{color:var(--success)!important;text-decoration:none!important;font-size:0.8rem!important;font-weight:600!important}
.addlink::before{content:"+ "!important}
/* SUBMIT ROW */
.submit-row{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:12px!important;padding:14px 20px!important;margin-top:18px!important;display:flex!important;gap:10px!important;align-items:center!important}
/* FORMS */
.form-row{border-bottom:1px solid var(--border)!important;padding:14px 0!important}
.form-row:last-child{border-bottom:none!important}
label,.required{color:var(--text2)!important;font-size:0.8rem!important;font-weight:600!important}
input[type=text],input[type=password],input[type=email],input[type=number],input[type=url],textarea,select{background:var(--bg)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:8px!important;padding:9px 13px!important;font-size:0.875rem!important;font-family:'Inter',sans-serif!important;width:100%!important;transition:border-color 0.2s!important}
input:focus,textarea:focus,select:focus{border-color:var(--ac)!important;outline:none!important;box-shadow:0 0 0 3px rgba(232,133,58,0.12)!important}
.help,.help-text{color:var(--text3)!important;font-size:0.75rem!important}
/* FIELDSETS */
fieldset{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:12px!important;padding:0!important;margin-bottom:16px!important;overflow:hidden!important}
fieldset h2{background:var(--bg4)!important;color:var(--ac)!important;font-size:0.7rem!important;text-transform:uppercase!important;letter-spacing:1px!important;padding:12px 18px!important;border-bottom:1px solid var(--border)!important;margin:0!important;font-weight:800!important}
fieldset .form-row{padding:12px 18px!important}
/* MESSAGES */
ul.messagelist{margin:0 0 16px!important;padding:0!important;list-style:none!important}
ul.messagelist li{border-radius:10px!important;margin-bottom:8px!important;padding:11px 18px!important;font-size:0.84rem!important;font-weight:500!important;display:flex!important;align-items:center!important;gap:10px!important}
ul.messagelist li.success{background:rgba(58,207,128,0.1)!important;border:1px solid rgba(58,207,128,0.25)!important;color:#6ee09e!important}
ul.messagelist li.success::before{content:"✅"!important}
ul.messagelist li.error{background:rgba(232,80,80,0.1)!important;border:1px solid rgba(232,80,80,0.25)!important;color:#f08080!important}
ul.messagelist li.error::before{content:"❌"!important}
ul.messagelist li.warning{background:rgba(245,158,11,0.1)!important;border:1px solid rgba(245,158,11,0.25)!important;color:#fcd34d!important}
ul.messagelist li.warning::before{content:"⚠️"!important}
/* PAGINATOR */
.paginator{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:10px!important;padding:10px 16px!important;margin-top:14px!important;color:var(--text2)!important;font-size:0.82rem!important}
.paginator a,.paginator a:visited{color:var(--ac)!important;text-decoration:none!important;padding:4px 8px!important;border-radius:5px!important}
.paginator a:hover{background:rgba(232,133,58,0.1)!important}
/* OBJECT TOOLS */
.object-tools{margin:0 0 16px!important}
.object-tools a{background:var(--bg3)!important;border:1px solid var(--border)!important;color:var(--text2)!important;border-radius:8px!important;padding:7px 14px!important;font-size:0.78rem!important;font-weight:600!important;text-decoration:none!important;transition:all 0.2s!important}
.object-tools a:hover{border-color:var(--ac)!important;color:var(--ac)!important}
/* INLINE */
.inline-group{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:12px!important;margin-top:18px!important;overflow:hidden!important}
.inline-group h2{background:var(--bg4)!important;color:var(--ac)!important;font-size:0.7rem!important;text-transform:uppercase!important;letter-spacing:1px!important;padding:12px 18px!important;border-bottom:1px solid var(--border)!important;margin:0!important}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--ac)}
/* FOOTER */
#footer{background:var(--bg2)!important;border-top:1px solid var(--border)!important;color:var(--text3)!important;font-size:0.72rem!important;text-align:center!important;padding:12px!important}
/* CHECKBOX */
input[type=checkbox]{accent-color:var(--ac)!important;width:15px!important;height:15px!important}
/* SORTABLE */
th.sorted{color:var(--ac)!important}
th.sorted a{color:var(--ac)!important}
/* CALENDAR */
.calendarbox,.clockbox{background:var(--bg3)!important;border:1px solid var(--border)!important;border-radius:10px!important;color:var(--text)!important}
</style>
{% endblock %}
{% block footer %}
<div id="footer">
  <strong style="color:var(--ac)">🛍 YOVO Admin Portal</strong> &nbsp;·&nbsp; Your Old, Valued Once More &nbsp;·&nbsp; <span style="color:var(--success)">● System Online</span>
</div>
{% endblock %}
